name: CI Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: docker-compose up -d

      - run: sleep 15

      - run: curl -f http://localhost:8080 || exit 1

      - if: always()
        run: docker-compose down